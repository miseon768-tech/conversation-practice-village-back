name: Backend Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Java 환경 설정 (JAR 파일을 만들기 위해 필요합니다)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. Gradle 빌드 도구에 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 3. 프로젝트 빌드 (이 단계가 끝나야 build/libs 폴더에 jar 파일이 생깁니다)
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      # 4. AWS 인증 (프론트엔드 성공시킨 그 열쇠를 사용합니다)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      # 5. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 6. 도커 이미지 빌드 및 푸시
      - name: Build and Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/conversation-practice-village-back:latest .
          docker push $ECR_REGISTRY/conversation-practice-village-back:latest

      # 7. EC2 서버 접속 및 배포 실행
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/
            aws ecr get-login-password --region ap-northeast-2 | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            sudo docker-compose pull village-backend
            sudo docker-compose up -d village-backend
            sudo docker image prune -f