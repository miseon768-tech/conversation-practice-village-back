spring.profiles.active=dev
spring.application.name=conversation-practice-village-back

# Google Gemini API Settings
google.gemini.api-key=${GEMINI_API_KEY}
google.gemini.base-url=https://generativelanguage.googleapis.com
google.gemini.api-version=v1
google.gemini.models=gemini-2.5-flash-lite

# Database configuration
spring.datasource.url=jdbc:mysql://database-1.cvkqiwea22jn.ap-northeast-2.rds.amazonaws.com:3306/conversation_practice_village
spring.datasource.username=admin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Swagger/SpringDoc OpenAPI Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.show-extensions=true
